name: Weekly monitoring report

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check weekly report configuration
        id: config
        env:
          MONITORING_BASE_URL: ${{ secrets.MONITORING_BASE_URL }}
          MONITORING_CRON_TOKEN: ${{ secrets.MONITORING_CRON_TOKEN }}
        run: |
          if [ -z "$MONITORING_BASE_URL" ] || [ -z "$MONITORING_CRON_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "### Weekly monitoring report skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing GitHub Actions secret MONITORING_BASE_URL and/or MONITORING_CRON_TOKEN." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger weekly report email
        if: steps.config.outputs.configured == 'true'
        env:
          MONITORING_BASE_URL: ${{ secrets.MONITORING_BASE_URL }}
          MONITORING_CRON_TOKEN: ${{ secrets.MONITORING_CRON_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -H "x-monitoring-token: $MONITORING_CRON_TOKEN" \
            "$MONITORING_BASE_URL/api/debug/weekly-report?send=1"
